<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>tally-ho - sign in</title>
  <link rel="stylesheet" href="/static/theme.css" />
</head>
<body class="centered">
  <form id="f" class="card">
    <h1>🎈 tally-ho</h1>
    <div id="err" class="notice"></div>
    <label>Username
      <input id="username" autocomplete="username" required autofocus />
    </label>
    <label>Password
      <input id="password" type="password" autocomplete="current-password" required />
    </label>
    <button id="go" type="submit">Sign in</button>
  </form>
  <script>
    const $ = (id) => document.getElementById(id);
    const err = (text) => {
      $("err").textContent = text;
      $("err").className = "notice" + (text ? " err" : "");
    };
    $("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("go").disabled = true;
      err("");
      try {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: $("username").value.trim(),
                                 password: $("password").value }),
        });
        if (r.ok) { location.href = "/"; return; }
        let detail = r.statusText;
        try { detail = (await r.json()).detail || detail; } catch {}
        err(detail);
      } catch (e2) {
        err("server unreachable - " + e2.message);
      }
      $("go").disabled = false;
    });
  </script>
</body>
</html>
